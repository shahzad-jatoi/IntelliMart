<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Classifier</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input, textarea, button { width: 100%; margin-top: 6px; padding: 10px; font-size: 14px; }
    button { cursor: pointer; background: #2d6cdf; color: white; border: none; border-radius: 8px; }
    button:hover { background: #2353a6; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>E-commerce Product Classifier</h1>
  <p>Web integration for DS201 model service.</p>

  <div class="card">
    <label for="title">Product Title</label>
    <input id="title" placeholder="Samsung Galaxy S23 Smartphone 256GB" />

    <label for="description">Description (optional)</label>
    <textarea id="description" rows="5" placeholder="6.1-inch display with 50MP camera"></textarea>

    <button id="submitBtn">Classify Product</button>
  </div>

  <div class="card">
    <h3>Response</h3>
    <pre id="output">Submit a product to see prediction results.</pre>
  </div>

  <script>
    const btn = document.getElementById("submitBtn");
    const output = document.getElementById("output");

    btn.addEventListener("click", async () => {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();

      if (!title) {
        output.textContent = "Title is required.";
        return;
      }

      output.textContent = "Processing...";
      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, description: description || null })
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = `Request failed: ${error}`;
      }
    });
  </script>
</body>
</html>
